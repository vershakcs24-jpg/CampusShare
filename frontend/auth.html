<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShare - Authentication</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-card" id="loginCard">
        <h2 class="auth-title">CampusShare Login</h2>

        <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter your NITJ email" required>
        </div>

        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <small class="error-msg" id="loginError"></small>

        <button class="btn-primary" id="loginSubmitBtn">Login</button>

        <p class="switch-line"><a href="#" id="goToForgot">Forgot Password?</a></p>
        <p class="switch-line">Don't have an account? <a href="#" id="goToSignup">Sign up</a></p>
    </div>

   
    <div class="auth-card hidden" id="forgotCard">
        <h2 class="auth-title">Reset Your Password</h2>
        <p style="text-align:center; color:#4a5568; font-size:0.9rem; margin-bottom:20px;">
            Enter your registered email and we'll send you a link to reset your password.
        </p>

        <div class="form-group">
            <label for="forgotEmail">Email Address</label>
            <input type="email" id="forgotEmail" placeholder="yourname@nitj.ac.in" required>
        </div>

        <small class="error-msg" id="forgotError"></small>

        <button class="btn-primary" id="forgotSubmitBtn">Send Reset Link</button>

        <p class="switch-line"><a href="#" id="backToLoginFromForgot">Back to Login</a></p>
    </div>

    <div class="auth-card hidden" id="resetCard">
        <h2 class="auth-title">Set a New Password</h2>

        <div class="form-group">
            <label for="resetNewPassword">New Password</label>
            <input type="password" id="resetNewPassword" placeholder="Create a new password" required>
        </div>

        <div class="form-group">
            <label for="resetConfirmPassword">Confirm New Password</label>
            <input type="password" id="resetConfirmPassword" placeholder="Re-enter your new password" required>
        </div>

        <small class="error-msg" id="resetError"></small>

        <button class="btn-primary" id="resetSubmitBtn">Reset Password</button>

        <p class="switch-line"><a href="#" id="backToLoginFromReset">Back to Login</a></p>
    </div>


    <div class="auth-card hidden" id="signupCard">
        <h2 class="auth-title">CampusShare Sign Up</h2>

        <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" placeholder="yourname@nitj.ac.in" required>
        </div>

        <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input type="password" id="signupConfirmPassword" placeholder="Re-enter your password" required>
        </div>



        <small class="error-msg" id="signupError"></small>

        <button class="btn-primary" id="signupSubmitBtn">Sign Up</button>

        <p class="switch-line">Already have an account? <a href="#" id="goToLogin">Login</a></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
